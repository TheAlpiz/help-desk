services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      - NODE_ENV=production

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/help-desk
      # Set in the server environment / EasyPanel secrets — never commit the real
      # value. Generate with: openssl rand -hex 64  (rotating invalidates all
      # existing JWTs, forcing every user to log in again).
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in server env}
      # Set in the server environment / EasyPanel secrets — never commit the real
      # value. Generate once with: openssl rand -hex 32  (stable forever after).
      - MAILBOX_ENCRYPTION_KEY=${MAILBOX_ENCRYPTION_KEY:?set MAILBOX_ENCRYPTION_KEY in server env}
      - APP_BASE_URL=https://helpdesk.yerliva.com
      - CORS_ORIGINS=https://helpdesk.yerliva.com
      # Bare host or empty (host-only). NEVER a URL — a protocol here makes the
      # browser drop the auth cookie. Empty = host-only cookie for this domain.
      - COOKIE_DOMAIN=
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - SMTP_HOST=mail.yerliva.com
      - SMTP_PORT=465
      - SMTP_SECURE=true
      - SMTP_USER=info@yerliva.com
      # Secrets sourced from server env / EasyPanel — never commit real values.
      - SMTP_PASS=${SMTP_PASS:?set SMTP_PASS in server env}
      - SMTP_FROM=info@yerliva.com
      - SENTRY_DSN=${SENTRY_DSN:-}
      - LOG_LEVEL=info
      - EMAIL_INGEST_BLOCKLIST=info@yerliva.com
      - MINIO_PUBLIC_URL=https://minio.yerliva.com/api
    depends_on:
      - db
      - redis
      - minio

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=help-desk
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
